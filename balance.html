<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>StarLabs Project Balance</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  #game-container {
    position: relative;
    width: 400px;
    height: 700px;
    max-width: 100vw;
    max-height: 100vh;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(100, 180, 255, 0.15), 0 0 80px rgba(100, 180, 255, 0.05);
  }
  #back-btn {
    position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(20,20,50,0.9); border: 1px solid rgba(100,140,220,0.4);
    color: #aaccff; padding: 11px 28px; border-radius: 25px;
    font-size: 12px; cursor: pointer; z-index: 10;
    font-family: inherit; letter-spacing: 1px;
    transition: all 0.2s;
  }
  #back-btn:hover { border-color: rgba(150,200,255,0.7); color: #fff; box-shadow: 0 0 20px rgba(100,150,255,0.2); }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>
  <button id="back-btn" >← MISSION CONTROL</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.20.0/matter.min.js"></script>
<script>
document.getElementById("back-btn").addEventListener("click",function(){location.href="index.html"});
// ─── Matter.js aliases ─────────────────────────────────
const { Engine, Render, Runner, Bodies, Body, Composite, Constraint, Mouse, MouseConstraint, Events, Vector } = Matter;

// ─── Canvas setup ──────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 400;
const H = 700;
canvas.width = W;
canvas.height = H;

// ─── Game state ────────────────────────────────────────
let points = 1250;
let gameOver = false;
let dropReady = true;
let craneX = W / 2;
let craneSpeed = 1.0;
let craneDir = 1;
let currentBlockType = 0;
let balanceAngle = 0;
let blocksPlaced = 3; // already placed

// Block definitions
const BLOCK_TYPES = [
  { name: 'DevOps\n(Sistemi)',    shape: 'square',   color: '#ff8c42', w: 42, h: 42, points: 100, weight: 1.0 },
  { name: 'QA\n(Sigurimi)',       shape: 'circle',   color: '#4ade80', r: 22,       points: 150, weight: 0.8 },
  { name: 'Senior Dev\n(Programues)', shape: 'rect', color: '#c084fc', w: 58, h: 26, points: 200, weight: 1.3 },
  { name: 'Database',             shape: 'hexagon',  color: '#facc15', r: 24,       points: 250, weight: 1.1 },
];

// ─── Physics engine ────────────────────────────────────
const engine = Engine.create({
  gravity: { x: 0, y: 0.8, scale: 0.001 }
});

// ─── World boundaries ──────────────────────────────────
const wallOptions = { isStatic: true, friction: 0.3, render: { visible: false } };
const ground = Bodies.rectangle(W / 2, H + 30, W + 60, 60, wallOptions);
const leftWall = Bodies.rectangle(-30, H / 2, 60, H + 60, wallOptions);
const rightWall = Bodies.rectangle(W + 30, H / 2, 60, H + 60, wallOptions);

// ─── Pivot (triangle base) ─────────────────────────────
const pivot = Bodies.rectangle(W / 2, H - 80, 16, 70, {
  isStatic: true,
  chamfer: { radius: 6 },
  friction: 0.2,
  label: 'pivot'
});

// ─── Seesaw platform ───────────────────────────────────
const platform = Bodies.rectangle(W / 2, H - 115, 300, 18, {
  chamfer: { radius: 6 },
  friction: 0.9,
  density: 0.004,
  label: 'platform'
});
// Pin the platform to the pivot
const pin = Constraint.create({
  pointA: { x: W / 2, y: H - 80 },
  bodyB: platform,
  pointB: { x: 0, y: 10 },
  length: 0,
  stiffness: 1
});

// ─── Pre-placed blocks ─────────────────────────────────
function createBlock(type, x, y) {
  const t = BLOCK_TYPES[type];
  let body;
  if (t.shape === 'square') {
    body = Bodies.rectangle(x, y, t.w, t.h, { chamfer: { radius: 6 }, friction: 1, density: 0.002, label: t.name });
  } else if (t.shape === 'circle') {
    body = Bodies.circle(x, y, t.r, { friction: 1, density: 0.002, label: t.name });
  } else if (t.shape === 'rect') {
    body = Bodies.rectangle(x, y, t.w, t.h, { chamfer: { radius: 8 }, friction: 1, density: 0.002, label: t.name });
  } else if (t.shape === 'hexagon') {
    body = Bodies.polygon(x, y, 6, t.r, { friction: 1, density: 0.002, label: t.name });
  }
  body.blockType = type;
  body.customColor = t.color;
  return body;
}

// Place initial 3 blocks on the platform — spread for balance
const devopsBlock  = createBlock(0, W / 2 - 75, H - 130);
const qaBlock      = createBlock(1, W / 2 - 15, H - 135);
const seniorBlock  = createBlock(2, W / 2 + 55, H - 130);

// ─── Crane ─────────────────────────────────────────────
const craneRailY = 60;
const craneBody = Bodies.rectangle(W / 2, craneRailY, W, 8, {
  isStatic: true,
  chamfer: { radius: 3 },
  label: 'craneRail'
});

// Crane claw (two small rectangles that open/close)
const clawLeft = Bodies.rectangle(W / 2 - 14, craneRailY + 30, 8, 28, {
  isStatic: true, angle: -0.3, chamfer: { radius: 2 }, label: 'clawL'
});
const clawRight = Bodies.rectangle(W / 2 + 14, craneRailY + 30, 8, 28, {
  isStatic: true, angle: 0.3, chamfer: { radius: 2 }, label: 'clawR'
});

Composite.add(engine.world, [
  ground, leftWall, rightWall,
  pivot, platform, pin,
  craneBody, clawLeft, clawRight,
  devopsBlock, qaBlock, seniorBlock
]);

// ─── Run engine ─────────────────────────────────────────
const runner = Runner.create();
Runner.run(runner, engine);

// ─── Input handling ────────────────────────────────────
canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  if (gameOver) { resetGame(); return; }
  if (dropReady) dropBlock();
});

// ─── Drop current block ────────────────────────────────
function dropBlock() {
  if (!dropReady) return;
  dropReady = false;

  const t = BLOCK_TYPES[currentBlockType];
  let body;
  const dropY = craneRailY + 75;
  // Slight random offset
  const ox = (Math.random() - 0.5) * 8;

  if (t.shape === 'square') {
    body = Bodies.rectangle(craneX + ox, dropY, t.w, t.h, {
      chamfer: { radius: 6 }, friction: 1, density: 0.002, label: t.name
    });
  } else if (t.shape === 'circle') {
    body = Bodies.circle(craneX + ox, dropY, t.r, {
      friction: 0.9, density: 0.002, label: t.name
    });
  } else if (t.shape === 'rect') {
    body = Bodies.rectangle(craneX + ox, dropY, t.w, t.h, {
      chamfer: { radius: 8 }, friction: 1, density: 0.002, label: t.name
    });
  } else if (t.shape === 'hexagon') {
    body = Bodies.polygon(craneX + ox, dropY, 6, t.r, {
      friction: 1, density: 0.002, label: t.name
    });
  }

  body.blockType = currentBlockType;
  body.customColor = t.color;
  Composite.add(engine.world, body);
  blocksPlaced++;

  // Next block type cycles
  currentBlockType = (currentBlockType + 1) % BLOCK_TYPES.length;

  // Cooldown before next drop
  setTimeout(() => { dropReady = true; }, 800);
}

function resetGame() {
  // Remove all blocks from world
  const toRemove = [];
  Composite.allBodies(engine.world).forEach(b => {
    if (b.blockType !== undefined) toRemove.push(b);
  });
  Composite.remove(engine.world, toRemove);

  // Re-add initial blocks with correct spread
  const d = createBlock(0, W / 2 - 75, H - 130);
  const q = createBlock(1, W / 2 - 15, H - 135);
  const s = createBlock(2, W / 2 + 55, H - 130);
  Composite.add(engine.world, [d, q, s]);

  // Reset platform
  Body.setAngle(platform, 0);
  Body.setPosition(platform, { x: W / 2, y: H - 115 });
  Body.setAngularVelocity(platform, 0);
  Body.setVelocity(platform, { x: 0, y: 0 });

  points = 1250;
  gameOver = false;
  dropReady = true;
  blocksPlaced = 3;
  currentBlockType = 0;
  craneX = W / 2;
}

// ─── Particle system ───────────────────────────────────
const particles = [];
function spawnParticles(x, y, color, count = 8) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 2,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color
    });
  }
}

// ─── Render loop ───────────────────────────────────────
function drawHexagon(cx, cy, r, angle = 0) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = angle + (i * Math.PI) / 3 - Math.PI / 6;
    const x = cx + r * Math.cos(a);
    const y = cy + r * Math.sin(a);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawStar(cx, cy, r, innerR) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = (i * Math.PI) / 5 - Math.PI / 2;
    const radius = i % 2 === 0 ? r : innerR;
    const x = cx + radius * Math.cos(a);
    const y = cy + radius * Math.sin(a);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function draw() {
  // ─── Background ──────────────────────────────────────
  // Gradient background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#0d0d1a');
  bgGrad.addColorStop(0.5, '#0a0a14');
  bgGrad.addColorStop(1, '#080812');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid pattern
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 30) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 30) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // ─── Crane Rail ──────────────────────────────────────
  const railY = craneRailY - 4;
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, railY - 4, W, 16);
  ctx.strokeStyle = '#4444aa';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, railY - 4, W, 16);
  // Rail glow
  ctx.shadowColor = '#6666cc';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(100,100,200,0.5)';
  ctx.beginPath(); ctx.moveTo(10, railY + 4); ctx.lineTo(W - 10, railY + 4); ctx.stroke();
  ctx.shadowBlur = 0;

  // ─── Moving Crane Carriage ───────────────────────────
  const craneY = railY + 4;
  // Carriage body
  ctx.fillStyle = '#2a2a4a';
  ctx.strokeStyle = '#5555aa';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(craneX - 22, craneY - 14, 44, 24, 6);
  ctx.fill();
  ctx.stroke();

  // Star icon on carriage
  ctx.fillStyle = '#ffd700';
  drawStar(craneX, craneY - 2, 8, 3.5);
  ctx.fill();

  // Cable
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath(); ctx.moveTo(craneX, craneY + 10); ctx.lineTo(craneX, craneY + 55); ctx.stroke();
  ctx.setLineDash([]);

  // ─── Claws ───────────────────────────────────────────
  const clawTop = craneY + 55;
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  // Left claw
  ctx.beginPath();
  ctx.moveTo(craneX, clawTop);
  ctx.lineTo(craneX - 14, clawTop + 28);
  ctx.stroke();
  // Right claw
  ctx.beginPath();
  ctx.moveTo(craneX, clawTop);
  ctx.lineTo(craneX + 14, clawTop + 28);
  ctx.stroke();

  // ─── Current block in claw ───────────────────────────
  const t = BLOCK_TYPES[currentBlockType];
  const heldY = clawTop + 12;
  if (t.shape === 'square') {
    ctx.fillStyle = t.color;
    ctx.shadowColor = t.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.roundRect(craneX - t.w/2, heldY - t.h/2, t.w, t.h, 4);
    ctx.fill();
  } else if (t.shape === 'circle') {
    ctx.fillStyle = t.color;
    ctx.shadowColor = t.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(craneX, heldY, t.r, 0, Math.PI * 2);
    ctx.fill();
  } else if (t.shape === 'rect') {
    ctx.fillStyle = t.color;
    ctx.shadowColor = t.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.roundRect(craneX - t.w/2, heldY - t.h/2, t.w, t.h, 6);
    ctx.fill();
  } else if (t.shape === 'hexagon') {
    ctx.fillStyle = t.color;
    ctx.shadowColor = t.color;
    ctx.shadowBlur = 10;
    drawHexagon(craneX, heldY, t.r, Date.now() * 0.001);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // ─── Trajectory arc ──────────────────────────────────
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  const trajStartX = craneX;
  const trajStartY = heldY + 25;
  ctx.moveTo(trajStartX, trajStartY);
  // Simple parabolic arc
  for (let i = 0; i <= 20; i++) {
    const t2 = i / 20;
    const tx = trajStartX;
    const ty = trajStartY + t2 * t2 * 300;
    ctx.lineTo(tx, ty);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // ─── Pivot triangle ──────────────────────────────────
  const pivotX = W / 2;
  const pivotY = H - 78;
  const pivotPos = pivot.position;

  // Gradient triangle
  const triGrad = ctx.createLinearGradient(pivotX, pivotY - 30, pivotX, pivotY + 30);
  triGrad.addColorStop(0, '#3a3a6a');
  triGrad.addColorStop(1, '#1a1a3a');
  ctx.fillStyle = triGrad;
  ctx.beginPath();
  ctx.moveTo(pivotX, pivotY - 35);
  ctx.lineTo(pivotX - 20, pivotY + 25);
  ctx.lineTo(pivotX + 20, pivotY + 25);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#5a5a9a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // ─── Seesaw platform ──────────────────────────────────
  const platPos = platform.position;
  const platAngle = platform.angle;
  balanceAngle = platAngle;

  ctx.save();
  ctx.translate(platPos.x, platPos.y);
  ctx.rotate(platAngle);

  // Platform body
  const platGrad = ctx.createLinearGradient(0, -9, 0, 9);
  platGrad.addColorStop(0, '#3a3a5a');
  platGrad.addColorStop(0.5, '#5a5a8a');
  platGrad.addColorStop(1, '#2a2a4a');
  ctx.fillStyle = platGrad;
  ctx.beginPath();
  ctx.roundRect(-150, -9, 300, 18, 4);
  ctx.fill();
  ctx.strokeStyle = '#7777bb';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Glow edge
  ctx.strokeStyle = 'rgba(150,150,255,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-148, -7);
  ctx.lineTo(148, -7);
  ctx.stroke();

  ctx.restore();

  // ─── Draw placed blocks with labels ──────────────────
  Composite.allBodies(engine.world).forEach(body => {
    if (body.blockType === undefined) return;
    if (body === devopsBlock || body === qaBlock || body === seniorBlock) {
      // Already rendered? No, these get rendered below
    }
    const pos = body.position;
    const angle = body.angle;
    const bt = body.blockType;
    const blockDef = BLOCK_TYPES[bt];

    ctx.save();
    ctx.translate(pos.x, pos.y);
    ctx.rotate(angle);

    ctx.fillStyle = body.customColor;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = body.customColor;
    ctx.shadowBlur = 8;

    if (blockDef.shape === 'square') {
      ctx.beginPath();
      ctx.roundRect(-blockDef.w/2, -blockDef.h/2, blockDef.w, blockDef.h, 6);
      ctx.fill();
      ctx.stroke();
    } else if (blockDef.shape === 'circle') {
      ctx.beginPath();
      ctx.arc(0, 0, blockDef.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    } else if (blockDef.shape === 'rect') {
      ctx.beginPath();
      ctx.roundRect(-blockDef.w/2, -blockDef.h/2, blockDef.w, blockDef.h, 8);
      ctx.fill();
      ctx.stroke();
    } else if (blockDef.shape === 'hexagon') {
      drawHexagon(0, 0, blockDef.r, 0);
      ctx.fill();
      ctx.stroke();
    }

    ctx.shadowBlur = 0;

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = ctx.measureText(blockDef.name).width > blockDef.w ? 'bold 7px system-ui' : 'bold 8px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lines = blockDef.name.split('\n');
    if (lines.length === 1) {
      ctx.fillText(lines[0], 0, 1);
    } else {
      ctx.fillText(lines[0], 0, -5);
      ctx.fillText(lines[1], 0, 7);
    }

    ctx.restore();
  });

  // ─── Particles ───────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ─── UI Overlay ──────────────────────────────────────
  // Title
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#8888ff';
  ctx.shadowBlur = 15;
  ctx.fillText('STARLABS', W / 2, H - 38);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(180,200,255,0.8)';
  ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('PROJECT BALANCE', W / 2, H - 22);

  // Points
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 16px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 10;
  ctx.fillText(`✦ Points: ${points}`, 14, H - 40);
  ctx.shadowBlur = 0;

  // ─── Balance Meter (right side) ──────────────────────
  const meterX = W - 30;
  const meterY = 120;
  const meterH = 200;

  // Meter background
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(meterX - 12, meterY - 10, 24, meterH + 20, 10);
  ctx.fill();
  ctx.stroke();

  // Meter label
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = 'bold 9px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('BALANCE', meterX, meterY - 18);

  // Meter fill (green center, red edges)
  const balancePercent = Math.abs(balanceAngle) / 0.80; // 0 to 1 (0.80 rad = max tilt)
  const clampedBal = Math.min(balancePercent, 1);

  const meterFillGrad = ctx.createLinearGradient(0, meterY + meterH, 0, meterY);
  meterFillGrad.addColorStop(0, '#ff3333');
  meterFillGrad.addColorStop(0.25, '#ffaa00');
  meterFillGrad.addColorStop(0.5, '#44ff44');
  meterFillGrad.addColorStop(0.75, '#ffaa00');
  meterFillGrad.addColorStop(1, '#ff3333');

  ctx.fillStyle = meterFillGrad;
  const fillHeight = meterH * (1 - clampedBal);
  const fillTop = meterY + fillHeight / 2;
  ctx.beginPath();
  ctx.roundRect(meterX - 7, fillTop, 14, meterH - fillHeight, 5);
  ctx.fill();

  // Meter indicator
  const indicatorY = meterY + meterH * (0.5 + balanceAngle * 0.8);
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(meterX - 14, indicatorY);
  ctx.lineTo(meterX + 14, indicatorY);
  ctx.lineTo(meterX, indicatorY + (balanceAngle > 0 ? -6 : 6));
  ctx.closePath();
  ctx.fill();

  // ─── Game Over overlay ───────────────────────────────
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#ff4444';
    ctx.font = 'bold 28px system-ui';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 20;
    ctx.fillText('IMBALANCED!', W / 2, H / 2 - 20);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = '14px system-ui';
    ctx.fillText('Tap to restart', W / 2, H / 2 + 20);
  }

  // ─── Drop hint ───────────────────────────────────────
  if (!gameOver && dropReady) {
    const alpha = 0.4 + Math.sin(Date.now() * 0.004) * 0.2;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = '11px system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('TAP TO DROP BLOCK', craneX, craneRailY + 100);
  }

  // ─── Block count ─────────────────────────────────────
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'right';
  ctx.fillText(`Blocks: ${blocksPlaced}`, W - 14, H - 40);

  requestAnimationFrame(draw);
}

// ─── Game logic tick ───────────────────────────────────
function gameTick() {
  if (gameOver) return;

  // Move crane
  craneX += craneSpeed * craneDir;
  if (craneX > W - 50) { craneDir = -1; }
  if (craneX < 50) { craneDir = 1; }

  // Update claw positions to follow crane
  Body.setPosition(clawLeft, { x: craneX - 14, y: craneRailY + 30 });
  Body.setPosition(clawRight, { x: craneX + 14, y: craneRailY + 30 });

  // Points: add over time based on balance
  const absAngle = Math.abs(balanceAngle);
  if (absAngle < 0.1) {
    points += 2; _axp(2); if(points>2000) _ub("balance_zen","Zen Master","☯️");
  } else if (absAngle < 0.2) {
    points += 1;
  }

  // Check for game over: too tilted or blocks fell off
  if (absAngle > 0.80) {
    gameOver = true;
    spawnParticles(W / 2, H - 100, '#ff4444', 30);
  }

  // Check if blocks fell off platform
  Composite.allBodies(engine.world).forEach(body => {
    if (body.blockType === undefined) return;
    if (body.position.y > H + 50) {
      Composite.remove(engine.world, body);
      gameOver = true;
      spawnParticles(body.position.x, H, '#ff4444', 20);
    }
  });

  // Bonus particles when well-balanced
  if (absAngle < 0.05 && Math.random() < 0.1) {
    spawnParticles(W / 2 + (Math.random() - 0.5) * 200, H - 120, '#44ff44', 2);
  }
}

setInterval(gameTick, 1000 / 60);

// ─── Start render ──────────────────────────────────────
draw();

function resize() {
  const container = document.getElementById('game-container');
  const maxW = Math.min(window.innerWidth, 400);
  const maxH = Math.min(window.innerHeight, 700);
  const scale = Math.min(maxW / W, maxH / H);
  container.style.width = (W * scale) + 'px';
  container.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();
