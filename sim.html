<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Simulation — StarLabs</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#06060f; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'Segoe UI',system-ui,sans-serif; touch-action:none; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; overflow:hidden; }
  #wrap { position:relative; width:400px; height:700px; max-width:100vw; max-height:100vh; }
  canvas { display:block; width:100%; height:100%; border-radius:12px; }
  #back { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); background: rgba(20,20,50,0.9); border: 1px solid rgba(100,140,220,0.4); color: #aaccff; padding: 11px 28px; border-radius: 25px; font-size: 12px; cursor: pointer; z-index: 10; font-family: inherit; letter-spacing: 1px; transition: all 0.2s; }
  #back:hover { border-color:rgba(150,180,255,0.6); color:#fff; }
</style>
</head>
<body>
<div id="wrap"><canvas id="g"></canvas><button id="back" >← MISSION CONTROL</button></div>

<script>
const c=document.getElementById('g'),ctx=c.getContext('2d');
const W=400,H=700;c.width=W;c.height=H;document.getElementById("back").addEventListener("click",function(){location.href="index.html"});

// ─── Game State ─────────
let money=500, power=100, staff=3, morale=80, reputation=50, day=1;
let projects=[], events=[], selectedProject=null, gameOver=false, gameOverReason='';
let particles=[], eventLog=[], tickTimer=0, eventCooldown=0;

const PROJECT_TYPES=[
  {name:'Fusion Reactor',icon:'⚡',cost:200,powerCost:30,staffNeed:2,duration:8,reward:400,risk:0.2,desc:'Develop a compact fusion core'},
  {name:'AI Assistant',icon:'🤖',cost:150,powerCost:15,staffNeed:1,duration:5,reward:300,risk:0.15,desc:'Train a new AI model'},
  {name:'Quantum Chip',icon:'💠',cost:300,powerCost:40,staffNeed:3,duration:10,reward:600,risk:0.3,desc:'Fabricate quantum processors'},
  {name:'Medical Scanner',icon:'🏥',cost:100,powerCost:10,staffNeed:1,duration:4,reward:200,risk:0.1,desc:'Build diagnostic scanner'},
  {name:'Satellite Uplink',icon:'🛰️',cost:250,powerCost:25,staffNeed:2,duration:7,reward:450,risk:0.25,desc:'Establish orbital comms'},
  {name:'Nanotech Lab',icon:'🔬',cost:180,powerCost:20,staffNeed:2,duration:6,reward:350,risk:0.18,desc:'Set up nanotech facility'},
];

const RANDOM_EVENTS=[
  {text:'Power surge! +25 power',power:25},
  {text:'Staff member quits unexpectedly 😢',staff:-1,minStaff:1},
  {text:'Government grant received! 💰',money:150},
  {text:'Equipment malfunction — repair costs',money:-80,minMoney:0},
  {text:'Breakthrough discovery! +20 reputation',reputation:20},
  {text:'Data breach — reputation drops',reputation:-15},
  {text:'Overtime boosts morale temporarily',morale:10,maxMorale:100},
  {text:'Budget audit — lose 10% money',moneyPercent:-0.1},
];

function sp(x,y,color,n=6){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5-2,life:1,decay:.03+Math.random()*.04,size:2+Math.random()*3,color});}

// ─── Actions ───────────
function startProject(idx){
  const p=PROJECT_TYPES[idx];
  if(money<p.cost) return;
  if(staff<p.staffNeed) return;
  money-=p.cost; staff-=p.staffNeed; power-=p.powerCost;
  projects.push({...p,progress:0,active:true});
  sp(W/2,H/2,'#44ff88',15);
  eventLog.unshift(`Started: ${p.name}`);
  if(eventLog.length>5) eventLog.pop();
}

function hireStaff(){
  if(money<50) return;
  money-=50; staff++; morale-=5;
  sp(W/2,H/2,'#44ccff',8);
}

function restTeam(){
  morale=Math.min(100,morale+15); power+=10;
}

// ─── Input ─────────────
c.addEventListener('pointerdown',e=>{
  e.preventDefault(); if(gameOver){restart();return;}
  const r=c.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);

  // Project cards
  const cardY=320;
  PROJECT_TYPES.forEach((p,i)=>{
    const y=cardY+i*40;
    if(mx>15&&mx<W-15&&my>y&&my<y+36) startProject(i);
  });

  // Hire button
  if(mx>W/2+10&&mx<W-15&&my>275&&my<305) hireStaff();
  // Rest button
  if(mx>15&&mx<W/2-10&&my>275&&my<305) restTeam();
});

function restart(){
  money=500;power=100;staff=3;morale=80;reputation=50;day=1;
  projects=[];events=[];gameOver=false;gameOverReason='';
  particles=[];eventLog=[];tickTimer=0;eventCooldown=0;
}

// ─── Update ─────────────
function update(){
  if(gameOver) return;
  tickTimer++;
  if(tickTimer>=120){ // 2 seconds per tick = 1 day
    tickTimer=0; day++; _axp(5); if(day>=10) _ub("sim_manager","Facility Manager","🏭"); if(day>=25) _ub("sim_director","Lab Director","👔");

    // Passive drain
    power-=5+Math.floor(day/10);
    morale-=2;

    // Update projects
    projects.forEach(p=>{
      if(!p.active) return;
      p.progress++;
      if(p.progress>=p.duration){
        p.active=false;
        money+=p.reward; reputation+=10; staff+=p.staffNeed;
        eventLog.unshift(`Completed: ${p.name} +$${p.reward}`); _axp(20);
        if(eventLog.length>5) eventLog.pop();
        sp(W/2,H/2,'#ffd700',20);
      }
      // Risk check
      if(Math.random()<p.risk*0.1){
        money-=Math.floor(p.reward*0.2);
        eventLog.unshift(`${p.name} hit a setback!`);
        if(eventLog.length>5) eventLog.pop();
      }
    });

    // Random events
    eventCooldown--;
    if(eventCooldown<=0&&Math.random()<0.3){
      eventCooldown=3;
      const ev=RANDOM_EVENTS[Math.floor(Math.random()*RANDOM_EVENTS.length)];
      if(ev.power) power=Math.max(0,Math.min(200,power+ev.power));
      if(ev.money) money=Math.max(0,money+(ev.money||0));
      if(ev.moneyPercent) money=Math.max(0,Math.floor(money*(1+ev.moneyPercent)));
      if(ev.staff) staff=Math.max(ev.minStaff||0,staff+ev.staff);
      if(ev.reputation) reputation=Math.max(0,Math.min(100,reputation+ev.reputation));
      if(ev.morale) morale=Math.max(0,Math.min(ev.maxMorale||100,morale+ev.morale));
      eventLog.unshift(ev.text);
      if(eventLog.length>5) eventLog.pop();
    }

    // Check game over
    if(money<=0&&projects.filter(p=>p.active).length===0) {gameOver=true;gameOverReason='Out of funds!';}
    if(power<=0) {gameOver=true;gameOverReason='Power failure!';}
    if(staff<=0) {gameOver=true;gameOverReason='No staff remaining!';}
    if(morale<=0) {gameOver=true;gameOverReason='Team morale collapsed!';}
    if(reputation<=0) {gameOver=true;gameOverReason='Reputation destroyed!';}
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0)particles.splice(i,1);}
}

// ─── Render ─────────────
function render(){
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#040a18');bg.addColorStop(1,'#020510');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(30,60,100,0.1)';ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=25){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}

  // Header
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,60);
  ctx.fillStyle='#fff';ctx.font='bold 14px system-ui';ctx.textAlign='left';
  ctx.fillText('🏭 STARLABS SIMULATOR',16,26);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px system-ui';
  ctx.fillText(`Day ${day}`,16,46);

  // Stats row
  const stats=[
    {label:'💰',val:'$'+money,color:'#ffd700',x:16},
    {label:'⚡',val:power+'W',color:'#44ccff',x:W/2-48},
    {label:'👥',val:''+staff,color:'#44ff88',x:W/2+10},
    {label:'❤️',val:morale+'%',color:'#ff6688',x:W-58},
  ];
  stats.forEach(s=>{
    ctx.fillStyle=s.color;ctx.font='bold 11px system-ui';ctx.textAlign='left';
    ctx.fillText(s.label+s.val,s.x,72);
  });

  // Reputation bar
  const rx=70,ry=80,rw=260,rh=10;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(rx,ry,rw,rh,5);ctx.fill();
  const rGrad=ctx.createLinearGradient(rx,ry,rx+rw,ry);
  rGrad.addColorStop(0,'#ff4466');rGrad.addColorStop(0.5,'#ffd700');rGrad.addColorStop(1,'#44ff88');
  ctx.fillStyle=rGrad;ctx.beginPath();ctx.roundRect(rx,ry,rw*reputation/100,rh,5);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='9px system-ui';ctx.textAlign='center';
  ctx.fillText(`Reputation: ${reputation}`,W/2,ry+22);

  // Active projects section
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 11px system-ui';ctx.textAlign='left';
  ctx.fillText('📋 Active Projects',16,120);

  if(projects.filter(p=>p.active).length===0){
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='11px system-ui';
    ctx.fillText('No active projects — start one below!',16,140);
  }else{
    let py=140;
    projects.filter(p=>p.active).forEach(p=>{
      const prog=p.progress/p.duration;
      ctx.fillStyle='rgba(20,30,60,0.7)';ctx.strokeStyle='rgba(100,160,240,0.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(16,py-8,W-32,24,6);ctx.fill();ctx.stroke();
      // Progress
      ctx.fillStyle='rgba(68,204,255,0.3)';ctx.beginPath();ctx.roundRect(16,py-8,(W-32)*prog,24,6);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='11px system-ui';ctx.textAlign='left';
      ctx.fillText(`${p.icon} ${p.name} (${p.progress}/${p.duration})`,24,py+6);
      py+=30;
    });
  }

  // Actions
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 11px system-ui';
  ctx.fillText('⚙️ Actions',16,260);
  // Hire
  ctx.fillStyle='rgba(68,204,255,0.1)';ctx.strokeStyle='#44ccff';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(W/2+10,275,W/2-25,30,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#44ccff';ctx.font='bold 11px system-ui';ctx.textAlign='center';
  ctx.fillText('👤 Hire ($50)',W/2+(W/2+10)/2,294);
  // Rest
  ctx.fillStyle='rgba(68,255,136,0.1)';ctx.strokeStyle='#44ff88';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.roundRect(15,275,W/2-25,30,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='#44ff88';ctx.font='bold 11px system-ui';ctx.textAlign='center';
  ctx.fillText('☕ Rest Team',15+(W/2-25)/2,294);

  // Project list
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='bold 11px system-ui';
  ctx.fillText('🔬 Research Projects',16,315);
  const cardY=330;
  PROJECT_TYPES.forEach((p,i)=>{
    const y=cardY+i*40;
    const canAfford=money>=p.cost&&staff>=p.staffNeed&&power>=p.powerCost;
    ctx.fillStyle=canAfford?'rgba(20,30,60,0.8)':'rgba(30,10,10,0.6)';
    ctx.strokeStyle=canAfford?'rgba(100,160,240,0.4)':'rgba(255,100,100,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(15,y,W-30,36,8);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='12px system-ui';ctx.textAlign='left';
    ctx.fillText(`${p.icon} ${p.name}`,24,y+14);
    ctx.fillStyle=canAfford?'rgba(200,220,255,0.6)':'#ff6666';ctx.font='9px system-ui';
    ctx.fillText(`$${p.cost} ⚡${p.powerCost} 👥${p.staffNeed} ⏱${p.d}d → $${p.reward}`,24,y+28);
  });

  // Event log
  ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 10px system-ui';ctx.textAlign='left';
  ctx.fillText('📰 News Feed',16,H-120);
  eventLog.forEach((ev,i)=>{
    ctx.fillStyle='rgba(200,220,255,0.5)';ctx.font='10px system-ui';
    ctx.fillText(`• ${ev}`,20,H-100+i*20);
  });

  // Game Over
  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4466';ctx.font='bold 28px system-ui';ctx.textAlign='center';
    ctx.shadowColor='#ff0000';ctx.shadowBlur=20;
    ctx.fillText('FACILITY OFFLINE',W/2,H/2-40);
    ctx.shadowBlur=0;
    ctx.fillStyle='#fff';ctx.font='16px system-ui';
    ctx.fillText(gameOverReason,W/2,H/2);
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='13px system-ui';
    ctx.fillText(`Survived ${day} days • ${projects.filter(p=>!p.active).length} projects completed`,W/2,H/2+30);
    ctx.fillText('Tap to restart',W/2,H/2+55);
  }

  // Particles
  particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;

  requestAnimationFrame(render);
}

setInterval(update,1000/60);
render();
console.log('🏭 StarLabs Simulator — Ready.');
</script>

<script>
// ═══ STARLABS PROGRESSION ═══
(function(){const K="starlabs_xp",B="starlabs_badges",G="starlabs_games";
localStorage.setItem(G,(parseInt(localStorage.getItem(G)||"0")+1).toString());
window._axp=function(a){const o=parseInt(localStorage.getItem(K)||"0"),n=o+a;localStorage.setItem(K,n.toString());const w=Math.floor(Math.sqrt(o/100))+1,nw=Math.floor(Math.sqrt(n/100))+1;if(nw>w){window._lvlup=1;window._nl=nw}else{window._lvlup=0}return n};
window._ub=function(id,nm,ic){const bs=JSON.parse(localStorage.getItem(B)||"[]");if(bs.find(function(x){return x.id===id}))return 0;bs.push({id:id,name:nm,icon:ic,date:Date.now()});localStorage.setItem(B,JSON.stringify(bs));return 1};
})();
</script>

</body>
</html>
