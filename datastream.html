<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Data Stream — StarLabs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060f;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
  }
  #game-wrap {
    position: relative;
    width: 400px; height: 700px;
    max-width: 100vw; max-height: 100vh;
  }
  canvas { display: block; width: 100%; height: 100%; border-radius: 12px; }
  #back-btn {
    position: absolute; top: 14px; left: 14px;
    background: rgba(20,20,50,0.8); border: 1px solid rgba(100,130,200,0.3);
    color: #aaccff; padding: 8px 14px; border-radius: 20px;
    font-size: 12px; cursor: pointer; z-index: 10;
    font-family: inherit; letter-spacing: 1px;
    transition: all 0.2s;
  }
  #back-btn:hover { border-color: rgba(150,200,255,0.7); color: #fff; box-shadow: 0 0 20px rgba(100,150,255,0.2); }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="game"></canvas>
  <button id="back-btn" >← MISSION CONTROL</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 700;
canvas.width = W; canvas.height = H;
document.getElementById("back-btn").addEventListener("click",function(){location.href="index.html"});

// ─── Game State ─────────
let score = 0, lives = 3, gameOver = false;
let playerX = W / 2;
let items = [], particles = [], bgLines = [];
let comboCount = 0, comboTimer = 0;
let speedMult = 1;
let difficultyTimer = 0;

// ─── Player ─────────────
const PLAYER_W = 60, PLAYER_Y = H - 80;

// ─── Item Types ─────────
const ITEM_TYPES = [
  { name: 'Data Packet', color: '#44ccff',  points: 10,  good: true,  shape: 'rect', w: 28, h: 16, glow: '#44ccff' },
  { name: 'API Call',    color: '#44ff88',  points: 25,  good: true,  shape: 'circle', r: 12, glow: '#44ff88' },
  { name: 'JSON Blob',   color: '#ffd700',  points: 50,  good: true,  shape: 'hexagon', r: 13, glow: '#ffd700' },
  { name: 'Encrypted',   color: '#cc44ff',  points: 75,  good: true,  shape: 'diamond', r: 14, glow: '#cc44ff' },
  { name: 'Malware',     color: '#ff3355',  points: -1,  good: false, shape: 'skull',   r: 15, glow: '#ff3355' },
  { name: 'DDoS Spike',  color: '#ff6600',  points: -1,  good: false, shape: 'spike',   r: 14, glow: '#ff6600' },
];

// ─── Background data lines ──
for (let i = 0; i < 20; i++) {
  bgLines.push({
    x: Math.random() * W, y: Math.random() * H,
    speed: 0.3 + Math.random() * 1.5,
    length: 15 + Math.random() * 40,
    opacity: 0.1 + Math.random() * 0.2,
  });
}

// ─── Particles ──────────
function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5 - 2,
      life: 1, decay: 0.03 + Math.random() * 0.05, size: 2 + Math.random() * 4, color,
    });
  }
}

// ─── Spawn Items ────────
function spawnItem() {
  const isGood = Math.random() < 0.7;
  let pool = ITEM_TYPES.filter(t => t.good === isGood);
  // Weighted: common early, rare later
  if (isGood) {
    const roll = Math.random();
    if (roll < 0.45) pool = [ITEM_TYPES[0]];
    else if (roll < 0.75) pool = [ITEM_TYPES[1]];
    else if (roll < 0.92) pool = [ITEM_TYPES[2]];
    else pool = [ITEM_TYPES[3]];
  } else {
    pool = [ITEM_TYPES[Math.random() < 0.6 ? 4 : 5]];
  }
  const type = pool[0];
  items.push({
    type,
    x: 30 + Math.random() * (W - 60),
    y: -20,
    speed: (1 + Math.random() * 2.5) * speedMult,
    wobble: (Math.random() - 0.5) * 2,
    wobblePhase: Math.random() * Math.PI * 2,
  });
}

// ─── Input ──────────────
canvas.addEventListener('pointermove', e => {
  if (gameOver) return;
  const rect = canvas.getBoundingClientRect();
  playerX = (e.clientX - rect.left) * (W / rect.width);
  playerX = Math.max(PLAYER_W / 2, Math.min(W - PLAYER_W / 2, playerX));
});
canvas.addEventListener('pointerdown', e => {
  if (gameOver) { restart(); return; }
  const rect = canvas.getBoundingClientRect();
  playerX = (e.clientX - rect.left) * (W / rect.width);
  playerX = Math.max(PLAYER_W / 2, Math.min(W - PLAYER_W / 2, playerX));
});

// ─── Restart ────────────
function restart() {
  score = 0; lives = 3; gameOver = false; comboCount = 0; comboTimer = 0;
  speedMult = 1; difficultyTimer = 0;
  items = []; particles = [];
  playerX = W / 2;
}

// ─── Draw shapes ────────
function drawItemShape(item) {
  const t = item.type;
  ctx.save();
  ctx.translate(0, 0);

  if (t.shape === 'rect') {
    ctx.beginPath();
    ctx.roundRect(-t.w/2, -t.h/2, t.w, t.h, 3);
    ctx.fill(); ctx.stroke();
  } else if (t.shape === 'circle') {
    ctx.beginPath(); ctx.arc(0, 0, t.r, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
  } else if (t.shape === 'hexagon') {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i * Math.PI) / 3 - Math.PI / 6;
      const px = t.r * Math.cos(a), py = t.r * Math.sin(a);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (t.shape === 'diamond') {
    ctx.beginPath();
    ctx.moveTo(0, -t.r); ctx.lineTo(t.r, 0);
    ctx.lineTo(0, t.r); ctx.lineTo(-t.r, 0);
    ctx.closePath(); ctx.fill(); ctx.stroke();
  } else if (t.shape === 'skull') {
    // Danger sign
    ctx.fillStyle = t.color;
    ctx.beginPath(); ctx.arc(0, 0, t.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px system-ui'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⚠', 0, 1);
  } else if (t.shape === 'spike') {
    // Spiky danger
    ctx.fillStyle = t.color;
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a = (i * Math.PI) / 4 - Math.PI / 2;
      const r = i % 2 === 0 ? t.r : t.r * 0.5;
      const px = r * Math.cos(a), py = r * Math.sin(a);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
  }

  ctx.restore();
}

// ─── Update ─────────────
function update() {
  if (gameOver) return;

  difficultyTimer++;
  speedMult = 1 + Math.floor(difficultyTimer / 600) * 0.3;

  // Combo decay
  if (comboTimer > 0) { comboTimer--; } else { comboCount = 0; }

  // Spawn
  if (Math.random() < 0.025 * (1 + difficultyTimer / 1200)) {
    spawnItem();
  }

  // Update items
  for (let i = items.length - 1; i >= 0; i--) {
    const item = items[i];
    item.wobblePhase += 0.05;
    item.x += Math.sin(item.wobblePhase) * item.wobble;
    item.y += item.speed;

    // Check catch
    const px = playerX, py = PLAYER_Y;
    const dx = item.x - px, dy = item.y - py;
    const catchDist = 35;
    if (dy > -catchDist && dy < catchDist && Math.abs(dx) < PLAYER_W / 2 + 20) {
      if (item.type.good) {
        const bonus = 1 + Math.floor(comboCount / 5);
        _axp(item.type.points * bonus); score += item.type.points * bonus;
        comboCount++; if(comboCount>=8) _ub("stream_combo","Stream Lord","🌊");
        comboTimer = 90;
        spawnParticles(item.x, item.y, item.type.glow, 8);
      } else {
        lives--;
        comboCount = 0;
        spawnParticles(item.x, item.y, '#ff0000', 25);
        if (lives <= 0) gameOver = true; if(score>=300) _ub("stream_catcher","Packet Catcher","📡"); if(score>=800) _ub("stream_master","Data Master","💎");
      }
      items.splice(i, 1);
      continue;
    }

    // Off screen
    if (item.y > H + 30) {
      if (item.type.good) {
        // Missed good packet
        comboCount = 0;
      }
      items.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── Render ─────────────
function render() {
  // BG
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#030815'); bg.addColorStop(1, '#010510');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(30,60,100,0.15)'; ctx.lineWidth = 0.5;
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Data lines
  bgLines.forEach(l => {
    l.y += l.speed;
    if (l.y > H) { l.y = 0; l.x = Math.random() * W; }
    ctx.strokeStyle = `rgba(68,180,255,${l.opacity})`;
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 8]);
    ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(l.x, l.y - l.length);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Items
  items.forEach(item => {
    ctx.save();
    ctx.translate(item.x, item.y);

    // Glow
    ctx.shadowColor = item.type.glow;
    ctx.shadowBlur = 8;

    ctx.fillStyle = item.type.good
      ? item.type.color
      : item.type.color;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;

    drawItemShape(item);
    ctx.shadowBlur = 0;

    // Label for good items
    if (item.type.good) {
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = 'bold 8px system-ui'; ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const label = item.type.name === 'Data Packet' ? 'PKT' :
                    item.type.name === 'API Call' ? 'API' :
                    item.type.name === 'JSON Blob' ? 'JSON' : 'ENC';
      ctx.fillText(label, 0, 1);
    }

    ctx.restore();
  });

  // Player (data dish)
  const px = playerX, py = PLAYER_Y;
  ctx.save();
  ctx.translate(px, py);

  // Dish glow
  const dishGrad = ctx.createLinearGradient(0, -30, 0, 10);
  dishGrad.addColorStop(0, 'rgba(68,200,255,0.3)');
  dishGrad.addColorStop(1, 'rgba(68,200,255,0)');
  ctx.fillStyle = dishGrad;
  ctx.beginPath();
  ctx.moveTo(-45, -30); ctx.quadraticCurveTo(0, -5, 45, -30);
  ctx.lineTo(40, -10); ctx.quadraticCurveTo(0, 10, -40, -10);
  ctx.closePath(); ctx.fill();

  // Dish body
  ctx.fillStyle = 'rgba(30,60,120,0.8)';
  ctx.strokeStyle = '#44ccff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-40, -25); ctx.quadraticCurveTo(0, 0, 40, -25);
  ctx.lineTo(48, -28); ctx.quadraticCurveTo(0, 2, -48, -28);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Center antenna
  ctx.strokeStyle = '#88ddff';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, -28); ctx.lineTo(0, -42); ctx.stroke();
  ctx.fillStyle = '#44ccff';
  ctx.beginPath(); ctx.arc(0, -44, 4, 0, Math.PI * 2); ctx.fill();

  ctx.restore();

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ─── UI ──────────────
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 60);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText('📡 DATA STREAM', 16, 26);

  ctx.fillStyle = '#44ccff';
  ctx.font = 'bold 18px system-ui';
  ctx.textAlign = 'right';
  ctx.fillText(score.toString(), W - 16, 26);

  // Lives
  ctx.fillStyle = '#44ccff';
  ctx.textAlign = 'left';
  ctx.font = '14px system-ui';
  ctx.fillText('🛡️'.repeat(Math.max(0, lives)), 16, 48);

  // Speed indicator
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.textAlign = 'right';
  ctx.font = '10px system-ui';
  ctx.fillText(`Speed x${speedMult.toFixed(1)}`, W - 16, 48);

  // Combo
  if (comboCount >= 3) {
    ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'center';
    ctx.font = 'bold 15px system-ui';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 10;
    ctx.fillText(`STREAM COMBO x${comboCount}`, W / 2, 48);
    ctx.shadowBlur = 0;
  }

  // Footer
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('STARLABS DATA PIPELINE — CATCH PACKETS · DODGE THREATS', W / 2, H - 10);

  // Game Over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = lives <= 0 ? '#ff4466' : '#ffd700';
    ctx.font = 'bold 30px system-ui';
    ctx.textAlign = 'center';
    ctx.shadowColor = lives <= 0 ? '#ff0000' : '#ffd700';
    ctx.shadowBlur = 20;
    ctx.fillText(lives <= 0 ? 'PIPELINE BREACHED' : 'STREAM ENDED', W / 2, H / 2 - 30);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = '18px system-ui';
    ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 10);

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '13px system-ui';
    ctx.fillText('Tap to restart', W / 2, H / 2 + 40);
  }

  requestAnimationFrame(render);
}

// ─── Start ──────────────
setInterval(update, 1000 / 60);
render();
console.log('📡 Data Stream — Ready. Catch the packets!');
</script>

<script>
// ═══ STARLABS PROGRESSION ═══
(function(){const K="starlabs_xp",B="starlabs_badges",G="starlabs_games";
localStorage.setItem(G,(parseInt(localStorage.getItem(G)||"0")+1).toString());
window._axp=function(a){const o=parseInt(localStorage.getItem(K)||"0"),n=o+a;localStorage.setItem(K,n.toString());const w=Math.floor(Math.sqrt(o/100))+1,nw=Math.floor(Math.sqrt(n/100))+1;if(nw>w){window._lvlup=1;window._nl=nw}else{window._lvlup=0}return n};
window._ub=function(id,nm,ic){const bs=JSON.parse(localStorage.getItem(B)||"[]");if(bs.find(function(x){return x.id===id}))return 0;bs.push({id:id,name:nm,icon:ic,date:Date.now()});localStorage.setItem(B,JSON.stringify(bs));return 1};
})();
</script>

</body>
</html>
