<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bug Squash — StarLabs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060f;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
    overflow: hidden;
  }
  #game-wrap {
    position: relative;
    width: 400px; height: 700px;
    max-width: 100vw; max-height: 100vh;
  }
  canvas { display: block; width: 100%; height: 100%; border-radius: 12px; }
  #back-btn {
    position: absolute; top: 14px; left: 14px;
    background: rgba(20,20,50,0.8); border: 1px solid rgba(100,130,200,0.3);
    color: #aaccff; padding: 8px 14px; border-radius: 20px;
    font-size: 12px; cursor: pointer; z-index: 10;
    font-family: inherit; letter-spacing: 1px;
    transition: all 0.2s;
  }
  #back-btn:hover { border-color: rgba(150,200,255,0.7); color: #fff; box-shadow: 0 0 20px rgba(100,150,255,0.2); }
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="game"></canvas>
  <button id="back-btn" >← MISSION CONTROL</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400, H = 700;
canvas.width = W; canvas.height = H;
document.getElementById("back-btn").addEventListener("click",function(){location.href="index.html"});

// ─── Game State ─────────
let score = 0, lives = 6, timer = 60, gameOver = false;
let bugs = [], particles = [], spawnTimer = 0;
let comboCount = 0, comboTimer = 0;
const BUG_TYPES = [
  { name: 'Syntax Bug',   color: '#ff4466', size: 26, points: 10,  speed: 0.8 },
  { name: 'Null Pointer', color: '#ff8800', size: 22, points: 15,  speed: 1.0 },
  { name: 'Memory Leak',  color: '#cc44ff', size: 28, points: 25,  speed: 0.6 },
  { name: 'Race Condition', color: '#44ff88', size: 20, points: 50, speed: 1.5 },
  { name: 'Logic Bomb',   color: '#ff0000', size: 32, points: 100, speed: 0.4 },
];

// ─── Circuit board state ──
const nodes = [];
for (let i = 0; i < 30; i++) {
  nodes.push({ x: Math.random() * W, y: 90 + Math.random() * (H - 180), r: 2 + Math.random() * 2 });
}
const traces = [];
for (let i = 0; i < 15; i++) {
  traces.push({
    x1: Math.random() * W, y1: 90 + Math.random() * (H - 180),
    x2: Math.random() * W, y2: 90 + Math.random() * (H - 180),
  });
}

// ─── Bug Hole positions ──
const HOLES = [];
for (let row = 0; row < 4; row++) {
  for (let col = 0; col < 4; col++) {
    HOLES.push({
      x: 50 + col * 100,
      y: 200 + row * 120,
      occupied: false,
      bug: null,
      glowPhase: Math.random() * Math.PI * 2,
    });
  }
}

// ─── Particles ──────────
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6 - 3,
      life: 1, decay: 0.03 + Math.random() * 0.05, size: 3 + Math.random() * 5, color,
    });
  }
}

// ─── Spawn Bug ──────────
function spawnBug() {
  const empty = HOLES.filter(h => !h.occupied);
  if (empty.length === 0) return;
  const hole = empty[Math.floor(Math.random() * empty.length)];
  const typeIdx = Math.random() < 0.4 ? 0 : Math.random() < 0.7 ? 1 : Math.random() < 0.85 ? 2 : Math.random() < 0.95 ? 3 : 4;
  const type = BUG_TYPES[typeIdx];
  hole.bug = {
    type,
    life: 1,
    growing: true,
    hole,
    appearTime: Date.now(),
    maxLife: 1500 + Math.random() * 2000,
  };
  hole.occupied = true;
}

// ─── Click Handler ──────
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (gameOver) { restart(); return; }

  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  let hit = false;
  for (const hole of HOLES) {
    if (!hole.bug || hole.bug.life < 0.5 || hole.bug.life > 1.1) continue;
    const dx = mx - hole.x;
    const dy = my - hole.y;
    const radius = hole.bug.type.size * hole.bug.life + 16;
    if (dx * dx + dy * dy < radius * radius) {
      // Hit!
      _axp(hole.bug.type.points); score += hole.bug.type.points * (1 + Math.floor(comboCount / 3));
      comboCount++; _axp(3); if(comboCount>=5) _ub("bugs_combo","Combo King","🔥");
      comboTimer = 60;
      spawnParticles(hole.x, hole.y, hole.bug.type.color, 15);
      hole.bug = null;
      hole.occupied = false;
      hit = true;
      break;
    }
  }

  if (!hit) {
    // Missed click — small penalty particles
    spawnParticles(mx, my, '#ffffff', 3);
  }
});

// ─── Restart ────────────
function restart() {
  score = 0; lives = 6; timer = 60; gameOver = false; comboCount = 0; comboTimer = 0;
  bugs = []; particles = [];
  HOLES.forEach(h => { h.bug = null; h.occupied = false; });
  spawnTimer = 0;
}

// ─── Game Loop ──────────
function update() {
  if (gameOver) return;

  // Timer
  if (timer > 0) {
    timer -= 1 / 60;
    if (timer <= 0) { gameOver = true; return; }
  }

  // Combo decay
  if (comboTimer > 0) { comboTimer--; } else { comboCount = 0; }

  // Spawn bugs
  spawnTimer++;
  const spawnRate = Math.max(25, 80 - score / 8);
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0;
    spawnBug();
  }

  // Update bugs
  for (const hole of HOLES) {
    if (!hole.bug) continue;
    const bug = hole.bug;
    if (bug.growing) {
      bug.life += 0.02;
      if (bug.life >= 1) bug.growing = false;
    } else {
      bug.life -= 0.005;
      if (bug.life <= 0) {
        // Bug escaped!
        lives--;
        spawnParticles(hole.x, hole.y, '#ff0000', 20);
        if (lives <= 0) { gameOver = true; }
        hole.bug = null;
        hole.occupied = false;
      }
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ─── Render ─────────────
function drawCircuitBoard() {
  // BG
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#060a12'); bg.addColorStop(1, '#020510');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(30,50,80,0.25)'; ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Circuit traces
  ctx.strokeStyle = 'rgba(50,120,200,0.2)'; ctx.lineWidth = 1;
  traces.forEach(t => {
    ctx.beginPath(); ctx.moveTo(t.x1, t.y1);
    const mx = (t.x1 + t.x2) / 2;
    ctx.lineTo(mx, t.y1); ctx.lineTo(mx, t.y2); ctx.lineTo(t.x2, t.y2);
    ctx.stroke();
  });

  // Nodes
  nodes.forEach(n => {
    ctx.fillStyle = 'rgba(80,160,240,0.4)';
    ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fill();
  });
}

function drawBug(hole) {
  const bug = hole.bug;
  if (!bug) return;
  const { x, y } = hole;
  const scale = bug.life;
  const t = bug.type;

  ctx.save();
  ctx.translate(x, y);

  // Hole glow
  ctx.fillStyle = `rgba(${t.color === '#ff4466' ? '255,68,102' : t.color === '#ff8800' ? '255,136,0' : t.color === '#cc44ff' ? '204,68,255' : t.color === '#44ff88' ? '68,255,136' : '255,0,0'},0.15)`;
  ctx.beginPath(); ctx.arc(0, 0, t.size + 8, 0, Math.PI * 2); ctx.fill();

  // Bug body
  ctx.fillStyle = t.color;
  ctx.shadowColor = t.color;
  ctx.shadowBlur = 10 * scale;
  ctx.beginPath();
  ctx.ellipse(0, 0, t.size * scale, t.size * 0.7 * scale, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Eyes
  const eyeX = t.size * 0.35 * scale;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-eyeX, -4 * scale, 4 * scale, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(eyeX, -4 * scale, 4 * scale, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-eyeX, -4 * scale, 2 * scale, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(eyeX, -4 * scale, 2 * scale, 0, Math.PI * 2); ctx.fill();

  // Antennae
  ctx.strokeStyle = t.color; ctx.lineWidth = 1.5 * scale;
  const wiggle = Math.sin(Date.now() * 0.01 + hole.x) * 3;
  ctx.beginPath(); ctx.moveTo(-5 * scale, -t.size * 0.5 * scale);
  ctx.lineTo(-8 * scale + wiggle, -t.size * 0.9 * scale); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(5 * scale, -t.size * 0.5 * scale);
  ctx.lineTo(8 * scale + wiggle, -t.size * 0.9 * scale); ctx.stroke();

  // Legs
  ctx.lineWidth = 1.2 * scale;
  for (let i = 0; i < 3; i++) {
    const lx = -t.size * 0.4 * scale + i * t.size * 0.35 * scale;
    const ly = t.size * 0.5 * scale;
    ctx.beginPath(); ctx.moveTo(lx, ly);
    ctx.lineTo(lx - 6 + i * 5, ly + 10 * scale); ctx.stroke();
  }

  ctx.restore();
}

function drawHole(hole) {
  const { x, y } = hole;
  // Server port ring
  ctx.strokeStyle = 'rgba(50,120,200,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(x, y, 24, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = 'rgba(10,20,40,0.6)';
  ctx.beginPath(); ctx.arc(x, y, 22, 0, Math.PI * 2); ctx.fill();

  // Blinking port LED
  const phase = Math.sin(Date.now() * 0.005 + hole.glowPhase);
  ctx.fillStyle = `rgba(80,160,240,${0.2 + phase * 0.15})`;
  ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
}

function drawUI() {
  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, 65);

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('🐛 BUG SQUASH', 16, 26);

  // Score
  ctx.fillStyle = '#44ff88';
  ctx.font = 'bold 18px system-ui';
  ctx.textAlign = 'right';
  ctx.fillText(score.toString(), W - 16, 26);

  // Timer
  const timerColor = timer < 10 ? '#ff4466' : '#88aacc';
  ctx.fillStyle = timerColor;
  ctx.font = 'bold 13px system-ui';
  ctx.textAlign = 'right';
  ctx.fillText(`⏱ ${Math.ceil(timer)}s`, W - 16, 48);

  // Lives
  ctx.fillStyle = '#ff4466';
  ctx.textAlign = 'left';
  ctx.font = '16px system-ui';
  ctx.fillText('❤️'.repeat(Math.max(0, lives)), 16, 50);

  // Combo
  if (comboCount >= 2) {
    ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'center';
    ctx.font = 'bold 14px system-ui';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 8;
    ctx.fillText(`COMBO x${comboCount}`, W / 2, 50);
    ctx.shadowBlur = 0;
  }

  // Server label
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('STARLABS SERVER v3.7 — 16 PORTS ACTIVE', W / 2, H - 14);

  // Game Over
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = lives <= 0 ? '#ff4466' : '#ffd700';
    ctx.font = 'bold 30px system-ui';
    ctx.textAlign = 'center';
    ctx.shadowColor = lives <= 0 ? '#ff0000' : '#ffd700';
    ctx.shadowBlur = 20;
    ctx.fillText(lives <= 0 ? 'SERVER CRASHED' : 'TIME UP!', W / 2, H / 2 - 30);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = '18px system-ui';
    ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 10);

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '13px system-ui';
    ctx.fillText('Tap to restart', W / 2, H / 2 + 40);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function render() {
  drawCircuitBoard();
  HOLES.forEach(drawHole);
  HOLES.forEach(drawBug);
  drawParticles();
  drawUI();
  requestAnimationFrame(render);
}

// ─── Start ──────────────
setInterval(update, 1000 / 60);
render();
console.log('🐛 Bug Squash — Ready. Squash those bugs!');
</script>

<script>
// ═══ STARLABS PROGRESSION ═══
(function(){const K="starlabs_xp",B="starlabs_badges",G="starlabs_games";
localStorage.setItem(G,(parseInt(localStorage.getItem(G)||"0")+1).toString());
window._axp=function(a){const o=parseInt(localStorage.getItem(K)||"0"),n=o+a;localStorage.setItem(K,n.toString());const w=Math.floor(Math.sqrt(o/100))+1,nw=Math.floor(Math.sqrt(n/100))+1;if(nw>w){window._lvlup=1;window._nl=nw}else{window._lvlup=0}return n};
window._ub=function(id,nm,ic){const bs=JSON.parse(localStorage.getItem(B)||"[]");if(bs.find(function(x){return x.id===id}))return 0;bs.push({id:id,name:nm,icon:ic,date:Date.now()});localStorage.setItem(B,JSON.stringify(bs));return 1};
})();
</script>

</body>
</html>
