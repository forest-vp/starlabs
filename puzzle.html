<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Puzzle Adventure — StarLabs</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060f;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;touch-action:none;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;overflow:hidden}
#wrap{position:relative;width:400px;height:700px;max-width:100vw;max-height:100vh}
canvas{display:block;width:100%;height:100%;border-radius:12px}
#back{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(20,20,50,0.9);border:1px solid rgba(100,140,220,0.4);color:#aaccff;padding:11px 28px;border-radius:25px;font-size:12px;cursor:pointer;z-index:10;font-family:inherit;letter-spacing:1px;transition:all .2s}
#back:hover{border-color:rgba(150,200,255,0.7);color:#fff;box-shadow:0 0 20px rgba(100,150,255,0.2)}
</style>
</head>
<body>
<div id="wrap"><canvas id="g"></canvas><button id="back">MISSION CONTROL</button></div>
<script>
// Back button
document.getElementById('back').addEventListener('click',function(){location.href='index.html'});

// XP System
(function(){
var K='starlabs_xp',B='starlabs_badges',G='starlabs_games';
localStorage.setItem(G,(parseInt(localStorage.getItem(G)||'0')+1).toString());
window._axp=function(a){var o=parseInt(localStorage.getItem(K)||'0'),n=o+a;localStorage.setItem(K,n.toString());var w=Math.floor(Math.sqrt(o/100))+1,nw=Math.floor(Math.sqrt(n/100))+1;if(nw>w){window._lvlup=1;window._nl=nw}else{window._lvlup=0}return n};
window._ub=function(id,nm,ic){var bs=JSON.parse(localStorage.getItem(B)||'[]');if(bs.find(function(x){return x.id===id}))return 0;bs.push({id:id,name:nm,icon:ic,date:Date.now()});localStorage.setItem(B,JSON.stringify(bs));return 1};
window._getXP=function(){return parseInt(localStorage.getItem(K)||'0')};
window._getLvl=function(){var xp=_getXP();return Math.floor(Math.sqrt(xp/100))+1};
window._getBadges=function(){return JSON.parse(localStorage.getItem(B)||'[]')};
})();

// Game
var c=document.getElementById('g'),ctx=c.getContext('2d');
var W=400,H=700;c.width=W;c.height=H;

var CHAPTERS=[
  {title:'The Locked Terminal',narrative:'You find an old StarLabs terminal. A 4-digit code is needed to access Project Nebula files.',puzzle:'code',solution:'7394',hints:['The first digit is the number of planets in our solar system','The last digit is 2x2','Think about the Apollo missions - that is digit two'],unlocked:true},
  {title:'The Pattern Grid',narrative:'The terminal displays a 3x3 grid of symbols. Find the missing symbol.',puzzle:'pattern',solution:'3',grid:['◇','○','□','□','◇','○','○','□','?'],hints:['Each row has all three shapes','Look at the columns - same rule applies','What shape has not appeared in the last row?'],unlocked:false},
  {title:'The Logic Gate',narrative:'The security system requires you to solve a binary puzzle.',puzzle:'logic',solution:'101',gates:[{a:0,b:0,out:0},{a:0,b:1,out:1},{a:1,b:0,out:1},{a:1,b:1,out:'?'}],hints:['This is a fundamental logic gate','Output is 1 when inputs are different','It is called XOR - exclusive OR'],unlocked:false},
  {title:'The Sequence Lock',narrative:'A numeric sequence guards the final door. What number comes next?',puzzle:'sequence',sequence:[2,3,5,7,11,13,'?'],solution:'17',hints:['These are special numbers','Each has exactly two divisors','They are prime numbers - the next after 13'],unlocked:false},
  {title:'The Master Cipher',narrative:'Decrypt the StarLabs master code using the Caesar cipher. Key: shift 3.',puzzle:'cipher',ciphertext:'VWDUODEV',solution:'STARLABS',hints:['Shift each letter backward by 3','V becomes S, W becomes T, D becomes A','It spells the name of this facility'],unlocked:false}
];

var chapter=0,input='',hintLevel=0,completed=[],particles=[],shakeTimer=0;
var storyText='',storyChar=0,storyDone=false;

function sp(x,y,color,n){n=n||8;for(var i=0;i<n;i++)particles.push({x:x,y:y,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6-3,life:1,decay:.03+Math.random()*.05,size:2+Math.random()*4,color:color})}
function startChapter(idx){chapter=idx;input='';hintLevel=0;storyText='';storyChar=0;storyDone=false;CHAPTERS[idx].unlocked=true}

c.addEventListener('pointerdown',function(e){
  e.preventDefault();
  var r=c.getBoundingClientRect();
  var mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);

  if(chapter>=CHAPTERS.length){
    if(my>H/2+30&&my<H/2+70){chapter=0;completed=[];startChapter(0)}
    return;
  }
  if(!storyDone){storyDone=true;storyChar=storyText.length;return}

  var ch=CHAPTERS[chapter];
  if(ch.puzzle==='code'){
    var pads=[{x:W/2-60,y:320,w:36,h:36,n:'1'},{x:W/2-18,y:320,w:36,h:36,n:'2'},{x:W/2+24,y:320,w:36,h:36,n:'3'},{x:W/2-60,y:365,w:36,h:36,n:'4'},{x:W/2-18,y:365,w:36,h:36,n:'5'},{x:W/2+24,y:365,w:36,h:36,n:'6'},{x:W/2-60,y:410,w:36,h:36,n:'7'},{x:W/2-18,y:410,w:36,h:36,n:'8'},{x:W/2+24,y:410,w:36,h:36,n:'9'},{x:W/2-18,y:455,w:36,h:36,n:'0'},{x:W/2-60,y:455,w:78,h:36,n:'⌫'},{x:W/2+24,y:455,w:36,h:36,n:'✓'}];
    for(var i=0;i<pads.length;i++){var p=pads[i];if(mx>p.x&&mx<p.x+p.w&&my>p.y&&my<p.y+p.h){
      if(p.n==='⌫'){input=input.slice(0,-1);sp(p.x+p.w/2,p.y+p.h/2,'#ff8800',5)}
      else if(p.n==='✓'){
        if(input===ch.solution){_axp(25);completed.push(chapter);sp(W/2,H/2,'#44ff88',30);if(chapter+1<CHAPTERS.length)startChapter(chapter+1);else{_ub('puzzle_master','Puzzle Master','🧩');chapter=CHAPTERS.length}}
        else{shakeTimer=20;sp(W/2,H/2,'#ff4466',15)}
      }else{if(input.length<4){input+=p.n;sp(p.x+p.w/2,p.y+p.h/2,'#44ccff',3)}}
    }}
  }else if(ch.puzzle==='pattern'){
    var opts=[{x:W/2-80,y:400,w:50,h:50,s:'◇'},{x:W/2-20,y:400,w:50,h:50,s:'○'},{x:W/2+40,y:400,w:50,h:50,s:'□'}];
    for(var i=0;i<opts.length;i++){var o=opts[i];if(mx>o.x&&mx<o.x+o.w&&my>o.y&&my<o.y+o.h){
      if(o.s===ch.solution){_axp(25);completed.push(chapter);sp(W/2,H/2,'#44ff88',30);if(chapter+1<CHAPTERS.length)startChapter(chapter+1);else{_ub('puzzle_master','Puzzle Master','🧩');chapter=CHAPTERS.length}}
      else{shakeTimer=20;sp(o.x+o.w/2,o.y+o.h/2,'#ff4466',15)}
    }}
  }else if(ch.puzzle==='logic'){
    var opts2=[{x:W/2-80,y:430,w:50,h:50,s:'0'},{x:W/2-20,y:430,w:50,h:50,s:'1'},{x:W/2+40,y:430,w:50,h:50,s:'?'}];
    for(var i=0;i<opts2.length;i++){var o=opts2[i];if(mx>o.x&&mx<o.x+o.w&&my>o.y&&my<o.y+o.h){
      if(o.s===ch.solution.slice(-1)){_axp(25);completed.push(chapter);sp(W/2,H/2,'#44ff88',30);if(chapter+1<CHAPTERS.length)startChapter(chapter+1);else{_ub('puzzle_master','Puzzle Master','🧩');chapter=CHAPTERS.length}}
      else{shakeTimer=20;sp(o.x+o.w/2,o.y+o.h/2,'#ff4466',15)}
    }}
  }else if(ch.puzzle==='sequence'){
    var pads2=[{x:W/2-60,y:400,w:36,h:36,n:'1'},{x:W/2-18,y:400,w:36,h:36,n:'2'},{x:W/2+24,y:400,w:36,h:36,n:'3'},{x:W/2-60,y:445,w:36,h:36,n:'4'},{x:W/2-18,y:445,w:36,h:36,n:'5'},{x:W/2+24,y:445,w:36,h:36,n:'6'},{x:W/2-60,y:490,w:36,h:36,n:'7'},{x:W/2-18,y:490,w:36,h:36,n:'8'},{x:W/2+24,y:490,w:36,h:36,n:'9'},{x:W/2-18,y:535,w:36,h:36,n:'0'},{x:W/2-60,y:535,w:78,h:36,n:'⌫'},{x:W/2+24,y:535,w:36,h:36,n:'✓'}];
    for(var i=0;i<pads2.length;i++){var p=pads2[i];if(mx>p.x&&mx<p.x+p.w&&my>p.y&&my<p.y+p.h){
      if(p.n==='⌫'){input=input.slice(0,-1);sp(p.x+p.w/2,p.y+p.h/2,'#ff8800',5)}
      else if(p.n==='✓'){
        if(input===ch.solution){_axp(25);completed.push(chapter);sp(W/2,H/2,'#44ff88',30);if(chapter+1<CHAPTERS.length)startChapter(chapter+1);else{_ub('puzzle_master','Puzzle Master','🧩');chapter=CHAPTERS.length}}
        else{shakeTimer=20;sp(W/2,H/2,'#ff4466',15)}
      }else{if(input.length<3){input+=p.n;sp(p.x+p.w/2,p.y+p.h/2,'#44ccff',3)}}
    }}
  }else if(ch.puzzle==='cipher'){
    for(var i=0;i<26;i++){var kx=30+i*13.5;if(mx>kx&&mx<kx+12&&my>450&&my<490){input+=String.fromCharCode(65+i);sp(kx+6,470,'#44ccff',3)}}
    if(mx>W/2-40&&mx<W/2+40&&my>520&&my<560){
      if(input.toUpperCase()===ch.solution){_axp(25);completed.push(chapter);sp(W/2,H/2,'#44ff88',30);if(chapter+1<CHAPTERS.length)startChapter(chapter+1);else{_ub('puzzle_master','Puzzle Master','🧩');chapter=CHAPTERS.length}}
      else{shakeTimer=20;sp(W/2,H/2,'#ff4466',15);input=''}
    }
    if(mx>W/2-40&&mx<W/2+40&&my>570&&my<600){input='';sp(W/2,585,'#ff8800',5)}
  }
  if(mx>W/2-80&&mx<W/2+80&&my>H-85&&my<H-40&&hintLevel<3){hintLevel++;sp(W/2,H-60,'#ffd700',10);if(hintLevel===1&&chapter===0)_ub('puzzle_nohint','Independent Thinker','💡')}
});

function update(){
  if(!storyDone&&storyText&&storyChar<storyText.length)storyChar+=1.5;
  if(storyChar>=storyText.length&&storyText)storyDone=true;
  if(shakeTimer>0)shakeTimer--;
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;if(p.life<=0)particles.splice(i,1)}
}

function render(){
  var ox=shakeTimer>0?(Math.random()-.5)*shakeTimer*0.5:0,oy=shakeTimer>0?(Math.random()-.5)*shakeTimer*0.5:0;
  var bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#050812');bg.addColorStop(1,'#020510');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(30,60,100,0.12)';ctx.lineWidth=0.5;
  for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  ctx.save();ctx.translate(ox,oy);

  // XP HUD
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,W,32);
  ctx.fillStyle='#ffd700';ctx.font='bold 10px system-ui';ctx.textAlign='left';
  ctx.fillText('XP: '+_getXP()+'  Lv.'+_getLvl(),16,22);
  var badges=_getBadges();if(badges.length>0){ctx.textAlign='right';ctx.fillText(badges.map(function(b){return b.icon}).slice(-4).join(' '),W-16,22)}

  if(chapter>=CHAPTERS.length){
    ctx.fillStyle='#fff';ctx.font='bold 28px system-ui';ctx.textAlign='center';ctx.shadowColor='#ffd700';ctx.shadowBlur=20;
    ctx.fillText('CLASSIFIED UNLOCKED',W/2,H/2-40);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(200,220,255,0.8)';ctx.font='14px system-ui';
    ctx.fillText('Project Nebula files are yours.',W/2,H/2);
    ctx.fillText('You solved all '+CHAPTERS.length+' puzzles!',W/2,H/2+25);
    ctx.fillStyle='rgba(255,215,0,0.15)';ctx.strokeStyle='#ffd700';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(W/2-70,H/2+50,140,40,20);ctx.fill();ctx.stroke();
    ctx.fillStyle='#ffd700';ctx.font='bold 14px system-ui';ctx.fillText('REPLAY MISSION',W/2,H/2+76)
  }else{
    var ch=CHAPTERS[chapter];
    ctx.fillStyle='#fff';ctx.font='bold 14px system-ui';ctx.textAlign='left';ctx.fillText('PUZZLE ADVENTURE',16,52);
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='10px system-ui';ctx.fillText('Chapter '+(chapter+1)+'/'+CHAPTERS.length,16,68);
    ctx.fillStyle='#ffd700';ctx.font='bold 18px system-ui';ctx.textAlign='center';ctx.shadowColor='#ffd700';ctx.shadowBlur=8;ctx.fillText(ch.title,W/2,100);ctx.shadowBlur=0;
    if(!storyText)storyText=ch.narrative;
    var disp=storyText.slice(0,Math.floor(storyChar));
    ctx.fillStyle='rgba(200,220,255,0.85)';ctx.font='13px system-ui';ctx.textAlign='center';wrapText(disp,W/2,130,W-60,20);
    if(!storyDone){ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='11px system-ui';ctx.fillText('(tap to continue)',W/2,180)}
    else{
      if(ch.puzzle==='code'||ch.puzzle==='sequence'){
        ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='13px system-ui';ctx.textAlign='center';
        ctx.fillText(ch.puzzle==='code'?'Enter the 4-digit code:':'What number comes next?',W/2,200);
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.strokeStyle='#44ccff';ctx.lineWidth=2;
        ctx.beginPath();ctx.roundRect(W/2-50,215,100,40,8);ctx.fill();ctx.stroke();
        ctx.fillStyle='#44ccff';ctx.font='bold 22px monospace';
        ctx.fillText(input.padEnd(ch.puzzle==='code'?4:3,'_').split('').join(' '),W/2,242);
        drawNumPad(W/2-78,ch.puzzle==='code'?320:400,36,10)
      }
      ctx.fillStyle='rgba(255,215,0,0.1)';ctx.strokeStyle='rgba(255,215,0,0.3)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(W/2-80,H-85,160,45,22);ctx.fill();ctx.stroke();
      ctx.fillStyle='#ffd700';ctx.font='bold 11px system-ui';ctx.textAlign='center';
      ctx.fillText(hintLevel<3?'HINT ('+(3-hintLevel)+' left)':'NO MORE HINTS',W/2,H-62);
      if(hintLevel>0){ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='10px system-ui';ctx.fillText(ch.hints[hintLevel-1],W/2,H-42)}
    }
  }
  ctx.restore();
  for(var i=0;i<particles.length;i++){var p=particles[i];ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;
  requestAnimationFrame(render)
}

function drawNumPad(x,y,s,gap){
  var nums=[['1','2','3'],['4','5','6'],['7','8','9'],['⌫','0','✓']];
  for(var row=0;row<4;row++)for(var col=0;col<3;col++){
    var px=x+col*(s+gap),py=y+row*(s+gap),n=nums[row][col];
    ctx.fillStyle='rgba(20,30,60,0.8)';ctx.strokeStyle=n==='✓'?'#44ff88':n==='⌫'?'#ff8800':'rgba(100,160,240,0.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(px,py,s,s,6);ctx.fill();ctx.stroke();
    ctx.fillStyle=n==='✓'?'#44ff88':n==='⌫'?'#ff8800':'#fff';ctx.font='bold 16px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(n,px+s/2,py+s/2)
  }
}

function wrapText(t,x,y,mw,lh){
  var w=t.split(' '),line='',ly=y;
  for(var i=0;i<w.length;i++){
    var test=line+w[i]+' ';
    if(ctx.measureText(test).width>mw&&line){ctx.fillText(line.trim(),x,ly);line=w[i]+' ';ly+=lh}
    else line=test
  }
  ctx.fillText(line.trim(),x,ly)
}

startChapter(0);setInterval(update,1000/60);render();
</script>
</body>
</html>
