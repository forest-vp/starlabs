<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Cosmic Research — StarLabs</title><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020812;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;touch-action:none}
#wrap{width:440px;max-width:100vw;height:100vh;max-height:750px;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;padding:8px 14px;background:rgba(8,16,36,0.95);border-bottom:1px solid rgba(60,120,220,0.15);gap:10px}
.hdr-logo{font-size:18px}.hdr-title{color:#fff;font-size:13px;font-weight:700;flex:1;letter-spacing:1px}
.hdr-btn{color:rgba(180,210,255,0.5);font-size:11px;cursor:pointer;padding:6px 12px;border-radius:16px;border:1px solid rgba(60,120,220,0.2);background:rgba(10,20,40,0.6);font-family:inherit;transition:all .2s}
.hdr-btn:hover{color:#fff;border-color:rgba(100,160,240,0.5)}
.game-area{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;overflow-y:auto;gap:10px}
.clicker{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(100,180,255,0.3),rgba(10,30,80,0.8));border:3px solid rgba(100,180,255,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:50px;transition:all .15s;box-shadow:0 0 30px rgba(77,168,255,0.2)}
.clicker:active{transform:scale(0.9)}
.resources{text-align:center}
.resources h2{color:#ffb830;font-size:24px;margin-bottom:2px}.resources p{color:rgba(180,210,240,0.5);font-size:11px}
.upgrades{width:100%;max-width:360px}
.upgrade{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(10,20,40,0.6);border:1px solid rgba(60,120,220,0.15);border-radius:12px;margin:6px 0;cursor:pointer;transition:all .2s}
.upgrade:hover{border-color:rgba(100,160,240,0.4)}
.upgrade.locked{opacity:0.4;cursor:default}
.upgrade .uname{color:#fff;font-size:12px;font-weight:600}.upgrade .ucost{color:rgba(180,210,240,0.5);font-size:10px}.upgrade .ucount{color:var(--accent);font-size:11px}
.rate{color:rgba(77,168,255,0.6);font-size:14px;text-align:center}
</style></head><body>
<div id="wrap">
<div class="hdr"><span class="hdr-logo">🔬</span><span class="hdr-title">COSMIC RESEARCH</span><button class="hdr-btn" onclick="location.href='index.html'">◂ MENU</button></div>
<div class="game-area">
<div class="resources"><h2 id="dataDisplay">0</h2><p>Research Data Points</p></div>
<div class="rate">+<span id="rateDisplay">1</span>/click</div>
<div class="clicker" id="clicker">⚛️</div>
<div class="upgrades" id="upgrades"></div>
</div></div>
<script>
(function(){var K="starlabs_xp",G="starlabs_games",B="starlabs_badges";localStorage.setItem(G,(parseInt(localStorage.getItem(G)||"0")+1).toString());
window._axp=function(a){var o=parseInt(localStorage.getItem(K)||"0"),n=o+a;localStorage.setItem(K,n.toString());return n};
window._ub=function(id,nm,ic){var bs=JSON.parse(localStorage.getItem(B)||"[]");if(bs.find(function(x){return x.id===id}))return 0;bs.push({id:id,name:nm,icon:ic,date:Date.now()});localStorage.setItem(B,JSON.stringify(bs));return 1}})();

var data=0,clickPower=1,autoRate=0,totalClicks=0;
var upgrades=[{name:'Quantum Scanner',baseCost:10,cost:10,count:0,effect:function(){clickPower+=1},desc:'+1 per click'},{name:'AI Assistant',baseCost:25,cost:25,count:0,effect:function(){autoRate+=0.5},desc:'+0.5/sec auto'},{name:'Fusion Lab',baseCost:80,cost:80,count:0,effect:function(){clickPower+=5},desc:'+5 per click'},{name:'Orbital Array',baseCost:200,cost:200,count:0,effect:function(){autoRate+=3},desc:'+3/sec auto'},{name:'Quantum AI Core',baseCost:500,cost:500,count:0,effect:function(){clickPower+=20;autoRate+=5},desc:'+20 click, +5/sec'}];

function render(){document.getElementById('dataDisplay').textContent=Math.floor(data);document.getElementById('rateDisplay').textContent=clickPower;
  var ug=document.getElementById('upgrades');ug.innerHTML='';
  upgrades.forEach(function(u,i){var div=document.createElement('div');div.className='upgrade'+(data>=u.cost?'':' locked');div.innerHTML='<div><div class="uname">'+u.name+'</div><div class="ucost">💎 '+u.cost+' — '+u.desc+'</div></div><div class="ucount">x'+u.count+'</div>';
  if(data>=u.cost)div.onclick=function(){data-=u.cost;u.count++;u.effect();u.cost=Math.floor(u.baseCost*Math.pow(1.5,u.count));render()};ug.appendChild(div)})
}

document.getElementById('clicker').addEventListener('pointerdown',function(e){e.preventDefault();data+=clickPower;totalClicks++;if(totalClicks>=100)_ub('cosmic_clicker','Data Pioneer','🔬');if(data>=1000)_ub('cosmic_rich','Research Tycoon','💎');_axp(1);render()});

setInterval(function(){data+=autoRate;render()},1000);
render();
</script></body></html>
